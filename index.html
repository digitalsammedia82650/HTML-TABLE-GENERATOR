<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TableCraft Pro ULTIMATE</title>
    <style>
        :root { 
            --primary: #4f46e5; --danger: #ef4444; --success: #10b981; 
            --accent: #f59e0b; --bg: #f8fafc; --border: #e2e8f0; 
        }
        body { font-family: 'Inter', system-ui, -apple-system; background: var(--bg); padding: 20px; color: #1e293b; margin: 0; }
        .container { max-width: 1400px; margin: auto; background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); border: 1px solid var(--border); }
        
        .io-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .io-box { display: flex; flex-direction: column; }
        .io-box label { font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; color: #64748b; }
        textarea { width: 100%; height: 90px; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: 'Fira Code', monospace; font-size: 12px; resize: none; transition: border 0.2s; }
        
        .toolbar { display: flex; flex-wrap: wrap; gap: 12px; background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 20px; align-items: center; }
        .btn-group { display: flex; background: #fff; padding: 4px; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        
        button { border: none; background: transparent; color: #475569; padding: 8px 12px; cursor: pointer; font-size: 12px; font-weight: 600; border-radius: 6px; transition: 0.2s; }
        button:hover { background: #f8fafc; color: var(--primary); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #4338ca; color: white; }
        .btn-danger:hover { color: var(--danger); background: #fef2f2; }

        .dim-input { display: flex; align-items: center; gap: 8px; padding-left: 12px; border-left: 2px solid var(--border); }
        input[type="number"] { width: 60px; border: 1px solid var(--border); padding: 7px; border-radius: 6px; font-size: 12px; }

        #tableWrapper { overflow: auto; border: 1px solid var(--border); border-radius: 8px; background: #fff; max-height: 50vh; }
        table { border-collapse: collapse; table-layout: fixed; min-width: 100%; }
        td { border: 1px solid var(--border); padding: 10px; min-width: 100px; outline: none; font-size: 14px; position: relative; background: #fff; }
        
        .selected { background: #e0e7ff !important; box-shadow: inset 0 0 0 2px var(--primary); z-index: 2; }
        .frozen { position: sticky; left: 0; background: #f8fafc !important; font-weight: bold; border-right: 2px solid var(--primary) !important; z-index: 10; }
    </style>
</head>
<body>

<div class="container">
    <div class="io-panels">
        <div class="io-box">
            <label>📥 CSV Import</label>
            <textarea id="csvInput" placeholder="Name, Role, Status"></textarea>
            <button class="btn-primary" onclick="applyCSV()" style="margin-top:8px; border-radius:8px; padding:10px">Build Table & Generate HTML</button>
        </div>
        <div class="io-box">
            <label>📦 Live HTML Export</label>
            <textarea id="output" readonly></textarea>
            <button class="btn-primary" onclick="copyHTML()" style="margin-top:8px; background: var(--success); border-radius:8px; padding:10px">Copy HTML Code</button>
        </div>
    </div>

    <div class="toolbar">
        <div class="btn-group">
            <button onclick="addRow()" title="Add Row Below">+ Row</button>
            <button onclick="deleteRow()" class="btn-danger" title="Delete Selected Row">- Row</button>
        </div>

        <div class="btn-group">
            <button onclick="addCol()" title="Add Column Right">+ Col</button>
            <button onclick="deleteCol()" class="btn-danger" title="Delete Selected Column">- Col</button>
        </div>

        <div class="btn-group">
            <button onclick="undo()">Undo</button>
            <button onclick="redo()">Redo</button>
        </div>

        <div class="btn-group">
            <button onclick="mergeCells()">Merge</button>
            <button onclick="freezeCol()">Freeze Col 1</button>
        </div>

        <div class="dim-input">
            <input id="dimW" type="number" placeholder="W px">
            <button onclick="setDimension('width')">Set Width</button>
            <input id="dimH" type="number" placeholder="H px">
            <button onclick="setDimension('height')">Set Height</button>
        </div>
    </div>

    <div id="tableWrapper"></div>
</div>

<script>
let grid = [], history = [], redoStack = [];
let selectedCells = new Set();
let isMouseDown = false;

function init(r=6, c=4) {
    grid = Array.from({length: r}, () => 
        Array.from({length: c}, () => ({value:"", rowspan:1, colspan:1, hidden:false, w:120, h:40}))
    );
    save(); render();
}

function render() {
    let html = '<table border="1" style="border-collapse: collapse; width: 100%; font-family: sans-serif;">\n<tbody>\n';
    grid.forEach((row, i) => {
        html += `  <tr style="height:${row[0]?.h || 40}px">\n`;
        row.forEach((cell, j) => {
            if(cell.hidden) return;
            let sel = selectedCells.has(`${i},${j}`) ? 'selected' : '';
            let style = `width:${cell.w}px; height:${cell.h}px;`;
            html += `    <td class="${sel}" contenteditable="true" data-r="${i}" data-c="${j}" 
                        rowspan="${cell.rowspan}" colspan="${cell.colspan}" style="${style}">${cell.value}</td>\n`;
        });
        html += '  </tr>\n';
    });
    html += '</tbody>\n</table>';
    
    document.getElementById('tableWrapper').innerHTML = html;
    document.getElementById('output').value = html;
    bindEvents();
}

function bindEvents() {
    document.querySelectorAll('td').forEach(td => {
        td.onmousedown = (e) => {
            isMouseDown = true;
            if(!e.shiftKey) selectedCells.clear();
            selectedCells.add(`${td.dataset.r},${td.dataset.c}`);
            render();
        };
        td.onmouseenter = () => { if(isMouseDown) { selectedCells.add(`${td.dataset.r},${td.dataset.c}`); render(); } };
        td.oninput = () => {
            grid[td.dataset.r][td.dataset.c].value = td.innerText;
            document.getElementById('output').value = document.getElementById('tableWrapper').innerHTML;
        };
        td.onblur = () => save();
    });
}

window.onmouseup = () => isMouseDown = false;

// --- Structural Actions ---
function addRow() {
    let cols = grid[0].length;
    grid.push(Array.from({length: cols}, () => ({value:"", rowspan:1, colspan:1, hidden:false, w:120, h:40})));
    save(); render();
}

function deleteRow() {
    if(grid.length <= 1) return;
    let selectedArr = [...selectedCells].map(s => s.split(',').map(Number));
    if(selectedArr.length === 0) return;
    let rowIndex = selectedArr[0][0];
    grid.splice(rowIndex, 1);
    selectedCells.clear();
    save(); render();
}

function addCol() {
    grid.forEach(row => row.push({value:"", rowspan:1, colspan:1, hidden:false, w:120, h:40}));
    save(); render();
}

function deleteCol() {
    if(grid[0].length <= 1) return;
    let selectedArr = [...selectedCells].map(s => s.split(',').map(Number));
    if(selectedArr.length === 0) return;
    let colIndex = selectedArr[0][1];
    grid.forEach(row => row.splice(colIndex, 1));
    selectedCells.clear();
    save(); render();
}

function setDimension(type) {
    let val = document.getElementById(type === 'width' ? 'dimW' : 'dimH').value;
    if(!val) return;
    selectedCells.forEach(key => {
        let [r, c] = key.split(',').map(Number);
        if(type === 'width') grid.forEach(row => { if(row[c]) row[c].w = val; });
        else grid[r].forEach(cell => cell.h = val);
    });
    save(); render();
}

function mergeCells() {
    if(selectedCells.size < 2) return;
    let coords = [...selectedCells].map(s => s.split(',').map(Number));
    let rMin = Math.min(...coords.map(c => c[0])), rMax = Math.max(...coords.map(c => c[0]));
    let cMin = Math.min(...coords.map(c => c[1])), cMax = Math.max(...coords.map(c => c[1]));
    grid[rMin][cMin].rowspan = rMax - rMin + 1;
    grid[rMin][cMin].colspan = cMax - cMin + 1;
    for(let r=rMin; r<=rMax; r++) {
        for(let c=cMin; c<=cMax; c++) {
            if(r === rMin && c === cMin) continue;
            grid[r][c].hidden = true;
        }
    }
    selectedCells.clear(); save(); render();
}

function applyCSV() {
    let raw = document.getElementById('csvInput').value.trim();
    if(!raw) return;
    grid = raw.split('\n').map(line => 
        line.split(',').map(v => ({value:v.trim(), rowspan:1, colspan:1, hidden:false, w:120, h:40}))
    );
    save(); render();
}

function save() { 
    history.push(JSON.stringify(grid)); 
    if(history.length > 20) history.shift();
    redoStack = []; 
}

function undo() { 
    if(history.length <= 1) return; 
    redoStack.push(history.pop()); 
    grid = JSON.parse(history[history.length-1]); 
    render(); 
}

function redo() { 
    if(!redoStack.length) return; 
    let state = redoStack.pop(); 
    history.push(state); 
    grid = JSON.parse(state); 
    render(); 
}

function copyHTML() {
    const out = document.getElementById('output');
    out.select();
    navigator.clipboard.writeText(out.value);
    alert("HTML code copied to clipboard!");
}

function freezeCol() {
    document.querySelectorAll('td[data-c="0"]').forEach(el => el.classList.toggle('frozen'));
}

init();
</script>
</body>
</html>
